<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denunciar Cliente - TechnoUp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="bg-slate-50">

<header class="bg-white shadow-sm border-b border-slate-200">
    <div class="mx-auto flex h-16 md:mx-12 lg:mx-28 items-center gap-8 px-4 sm:px-6">
        <a href="../../home.html" class="block text-blue-600">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-10 h-10">
                <path d="M12 28C17.5 28 20 22 27 22C31.5 22 34.5 24.5 34.5 24.5C34.5 24.5 30.5 19 24 19C17 19 14.5 25 8 25C8 25 9.5 28 12 28Z" fill="currentColor"/>
                <path d="M19 20C24.5 20 27 14 34 14C38.5 14 41.5 16.5 41.5 16.5C41.5 16.5 37.5 11 31 11C24 11 21.5 17 15 17C15 17 16.5 20 19 20Z" fill="currentColor"/>
            </svg>
        </a>
        <div class="flex flex-1 items-center justify-end md:justify-between">
            <nav aria-label="Global" class="hidden md:block">
                <ul class="flex items-center gap-6 text-sm font-medium text-slate-600">
                    <li><a href="../../home.html" class="transition hover:text-blue-600">Home</a></li>
                    <li><a href="../../catalogo.html" class="transition hover:text-blue-600">Catálogo</a></li>
                    <li><a href="../../sobre.html" class="transition hover:text-blue-600">Sobre</a></li>
                </ul>
            </nav>
            <div id="menuUsuario"></div>
        </div>
    </div>
</header>

<main class="mx-auto flex max-w-3xl flex-col gap-6 px-4 py-8 sm:px-6 lg:px-8">
    <section>
        <p class="text-sm font-semibold uppercase tracking-[0.22em] text-blue-600">Segurança</p>
        <h1 class="mt-2 text-3xl font-bold text-slate-950">Denunciar cliente</h1>
        <p class="mt-2 text-sm leading-6 text-slate-600">Selecione o cliente e descreva o comportamento inadequado para que a administração possa avaliar.</p>
    </section>

    <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
        <div id="mensagemFeedback" class="hidden mb-5 rounded-xl border px-4 py-3 text-sm"></div>

        <div class="space-y-5">
            <div>
                <label for="contaDenunciada" class="mb-1.5 block text-sm font-medium text-slate-700">Cliente denunciado</label>
                <select id="contaDenunciada" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm focus:border-blue-600 focus:outline-none focus:ring-1 focus:ring-blue-600">
                    <option value="">Carregando clientes...</option>
                </select>
            </div>

            <div>
                <label for="motivoDenuncia" class="mb-1.5 block text-sm font-medium text-slate-700">Motivo da denúncia</label>
                <textarea id="motivoDenuncia" rows="6" maxlength="1000" placeholder="Descreva o que aconteceu..." class="w-full resize-y rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm focus:border-blue-600 focus:outline-none focus:ring-1 focus:ring-blue-600"></textarea>
                <p class="mt-2 text-xs text-slate-500">Mínimo de 10 caracteres.</p>
            </div>

            <div class="flex flex-wrap gap-3">
                <a href="../../home.html" class="rounded-xl border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                    Cancelar
                </a>
                <button type="button" id="btnEnviarDenuncia" class="rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2">
                    Enviar denúncia
                </button>
            </div>
        </div>
    </section>
</main>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>
    const CAMINHO_API = '../../../api';
    const CAMINHO_FRONTEND = '../..';
</script>
<script src="../../js/_cabecalho.js"></script>
<script src="./js/denunciar.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
