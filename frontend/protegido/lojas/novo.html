<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro da Loja - TechnoUp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<div>
    <!-- Coluna do formulário -->
    <div>
        <div>
            <div>
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 28C17.5 28 20 22 27 22C31.5 22 34.5 24.5 34.5 24.5C34.5 24.5 30.5 19 24 19C17 19 14.5 25 8 25C8 25 9.5 28 12 28Z" fill="currentColor"/>
                    <path d="M19 20C24.5 20 27 14 34 14C38.5 14 41.5 16.5 41.5 16.5C41.5 16.5 37.5 11 31 11C24 11 21.5 17 15 17C15 17 16.5 20 19 20Z" fill="currentColor"/>
                </svg>
            </div>

            <h1 id="tituloCadastro">Cadastro da loja</h1>

            <!-- Mensagem de feedback -->
            <div id="mensagemFeedback"></div>

            <!-- Formulário sem action — JS cuida do envio -->
            <div id="cadastroBox">
                <div>

                    <div>
                        <input type="text" id="inputNomeLoja" placeholder=" "
                           >
                        <label for="inputNomeLoja">Nome da loja</label>
                    </div>

                    <div>
                        <input type="text" id="inputTelefone" placeholder=" "
                           >
                        <label for="inputTelefone">Telefone</label>
                    </div>

                    <div>
                        <input type="text" id="inputCpf" placeholder=" "
                           >
                        <label for="inputCpf">CPF</label>
                    </div>

                    <div>
                        <input type="text" id="inputCnpj" placeholder=" "
                           >
                        <label for="inputCnpj">CNPJ</label>
                    </div>

                    <div>
                        <input type="text" id="inputCep" placeholder=" "
                           >
                        <label for="inputCep">CEP</label>
                    </div>

                    <div>
                        <input type="text" id="inputEstado" placeholder=" "
                           >
                        <label for="inputEstado">Estado</label>
                    </div>

                    <div>
                        <input type="text" id="inputCidade" placeholder=" "
                           >
                        <label for="inputCidade">Cidade</label>
                    </div>

                    <div>
                        <input type="text" id="inputBairro" placeholder=" "
                           >
                        <label for="inputBairro">Bairro</label>
                    </div>

                    <div>
                        <input type="text" id="inputLogradouro" placeholder=" "
                           >
                        <label for="inputLogradouro">Logradouro</label>
                    </div>

                    <div>
                        <input type="text" id="inputNumero" placeholder=" "
                           >
                        <label for="inputNumero">Número</label>
                    </div>
                </div>

                
                <div>
                    <!----
                    <a id="btnVoltar" href="../../home.html"
                       >
                        Voltar
                    </a>
                    -->
                    <button id="btnSalvarLoja"
                       >
                        Cadastrar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Imagem lateral -->
    <div>
        <img
             src="https://images.unsplash.com/photo-1563986768817-257bf91c5753?q=80&w=1510&auto=format&fit=crop"
             alt="Ambiente de trabalho moderno">
        <div></div>
    </div>
</div>

<script>
    const CAMINHO_API     = '../../../api';
    const CAMINHO_FRONTEND = '../..';
</script>
<script src="../../css/style.js"></script>
<script src="js/novo.js"></script>
</body>
</html>
