<main class="mx-auto flex max-w-6xl flex-col gap-6 px-4 py-8 sm:px-6 lg:px-8">

        <div>
            <p class="text-sm font-semibold uppercase tracking-[0.22em] text-blue-600">Atendimento</p>

        <div class="flex rounded-xl border border-slate-200 bg-white p-1 shadow-sm">

            <button class="filtroStatus rounded-lg px-4 py-2 text-sm font-semibold text-slate-600" data-status="recusada">Recusadas</button>
        </div>
    </section>

    <div id="mensagemFeedback" class="hidden rounded-xl border px-4 py-3 text-sm"></div>

    <section id="listaAvaliacoes" class="grid gap-4">
