<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Produtos - TechnoUp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<!-- CABEÇALHO -->
<header>
    <div>
        <a href="../../home.html">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 28C17.5 28 20 22 27 22C31.5 22 34.5 24.5 34.5 24.5C34.5 24.5 30.5 19 24 19C17 19 14.5 25 8 25C8 25 9.5 28 12 28Z" fill="currentColor"/>
                <path d="M19 20C24.5 20 27 14 34 14C38.5 14 41.5 16.5 41.5 16.5C41.5 16.5 37.5 11 31 11C24 11 21.5 17 15 17C15 17 16.5 20 19 20Z" fill="currentColor"/>
            </svg>
        </a>
        <div>
            <nav aria-label="Global">
                <ul>
                    <li><a href="../../home.html">Home</a></li>
                    <li><a href="../../catalogo.html">Catálogo</a></li>
                    <li><a href="../../sobre.html">Sobre</a></li>
                </ul>
            </nav>
            <div id="menuUsuario"></div>
        </div>
    </div>
</header>

<!-- CONTEÚDO PRINCIPAL -->
<main>
    <div>
        <div>
            <h1>Sua loja</h1>
            <button id="btnNovoProduct"
               >
                Adicionar produto
            </button>
        </div>

        <!-- Mensagem de feedback -->
        <div id="mensagemFeedback"></div>

        <!-- Tabela de produtos -->
        <div>
            <table>
                <thead>
                    <tr>
                        <th>Ações</th>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Criado em</th>
                        <th>Descrição</th>
                        <th>Preço</th>
                        <th>Desconto</th>
                        <th>Preço Final</th>
                    </tr>
                </thead>
                <tbody id="tabelaProdutosBody">
                    <tr><td colspan="10">Carregando produtos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- MODAL DE CRIAR / EDITAR PRODUTO -->
<div id="modalProduto">
    <div>
        <h2 id="modalTitulo">Novo produto</h2>

        <!-- Campos do produto -->
        <div>
            <div>
                <input type="text" id="campoNome" placeholder=" "
                   >
                <label for="campoNome">Nome</label>
            </div>
            <div>
                <input type="number" id="campoPreco" placeholder=" " step="0.01"
                   >
                <label for="campoPreco">Preço (R$)</label>
            </div>
            <div>
                <input type="text" id="campoTipo" placeholder=" " list="tiposDatalist"
                   >
                <datalist id="tiposDatalist">
                    <option value="Armazenamento">
                    <option value="Placa de Vídeo">
                    <option value="Hardware">
                    <option value="Memória">
                    <option value="Periférico">
                    <option value="Monitor">
                    <option value="Smartphone">
                    <option value="Notebook">
                    <option value="Tablet">
                    <option value="Ergonomia">
                    <option value="Acessórios">
                </datalist>
                <label for="campoTipo">Tipo</label>
            </div>
            <div>
                <input type="text" id="campoModelo" placeholder=" "
                   >
                <label for="campoModelo">Modelo</label>
            </div>
            <div>
                <input type="text" id="campoMarca" placeholder=" "
                   >
                <label for="campoMarca">Marca</label>
            </div>
            <div>
                <input type="text" id="campoDescricao" placeholder=" "
                   >
                <label for="campoDescricao">Descrição</label>
            </div>
            <div>
                <input type="number" id="campoDesconto" placeholder=" " min="0" max="100"
                   >
                <label for="campoDesconto">Desconto (%)</label>
            </div>
        </div>

        <!-- Campo oculto para armazenar o ID na edição -->
        <input type="hidden" id="campoIdProduto">

        <!-- Botões do modal -->
        <div>
            <button id="btnSalvarProduto"
               >
                Salvar
            </button>
            <button id="btnFecharModal"
               >
                Cancelar
            </button>
        </div>
    </div>
</div>

<!-- RODAPÉ -->
<footer>
    <div>
        TechnoUp &copy; 2026. Todos os direitos reservados.
    </div>
</footer>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>
    const CAMINHO_API     = '../../../api';
    const CAMINHO_FRONTEND = '../..';
</script>
<script src="../../css/style.js"></script>
<script src="../../js/_cabecalho.js"></script>
<script src="js/gerenciar_produtos.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
