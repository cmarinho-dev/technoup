<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - TechnoUp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="bg-slate-50">
<header>
    <div>
        <a href="../../home.html">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 28C17.5 28 20 22 27 22C31.5 22 34.5 24.5 34.5 24.5C34.5 24.5 30.5 19 24 19C17 19 14.5 25 8 25C8 25 9.5 28 12 28Z" fill="currentColor"/>
                <path d="M19 20C24.5 20 27 14 34 14C38.5 14 41.5 16.5 41.5 16.5C41.5 16.5 37.5 11 31 11C24 11 21.5 17 15 17C15 17 16.5 20 19 20Z" fill="currentColor"/>
            </svg>
        </a>
        <div>
            <nav aria-label="Global">
                <ul>
                    <li><a href="../../home.html">Home</a></li>
                    <li><a href="../../catalogo.html">Catálogo</a></li>
                    <li><a href="../../sobre.html">Sobre</a></li>
                    <li><a href="../../protegido/comprador/chat.html">Chat</a></li>
                </ul>
            </nav>
            <div id="menuUsuario"></div>
        </div>
    </div>
</header>

<main class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-5xl flex-col gap-4 px-4 py-6 sm:px-6 lg:px-8">
    <section class="flex flex-col gap-5 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
        <div class="flex flex-wrap items-center justify-between gap-4 border-b border-slate-200 pb-4">
            <div class="flex items-center gap-3">
                <div class="flex h-12 w-12 items-center justify-center overflow-hidden rounded-xl bg-blue-50 text-blue-600">
                    <img id="lojaBanner" class="hidden h-full w-full object-cover" alt="">
                    <i id="lojaIcone" data-lucide="store" class="h-6 w-6"></i>
                </div>
                <div>
                    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-blue-600">Cotação de usado</p>
                    <h1 id="lojaNome" class="text-2xl font-bold text-slate-900">Chat da loja</h1>
                </div>
            </div>
            <button id="btnFecharChat" type="button" class="inline-flex items-center gap-2 rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                <i data-lucide="lock" class="h-4 w-4"></i>
                Fechar chat
            </button>
        </div>

        <div id="mensagemErro" class="hidden rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></div>

        <div id="listaMensagens" class="flex h-[58vh] min-h-[360px] flex-col gap-3 overflow-y-auto rounded-xl bg-slate-50 p-4">
            <div class="m-auto text-sm text-slate-500">Carregando conversa...</div>
        </div>

        <form id="formChat" class="flex flex-col gap-3 sm:flex-row">
            <textarea id="campoMensagem" rows="2" maxlength="1000" placeholder="Escreva sua mensagem..."
                class="min-h-14 flex-1 resize-none rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-1 focus:ring-blue-600"></textarea>
            <button id="btnEnviar" type="submit"
                class="inline-flex items-center justify-center gap-2 rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 disabled:cursor-not-allowed disabled:bg-slate-300">
                <i data-lucide="send" class="h-4 w-4"></i>
                Enviar
            </button>
        </form>
    </section>
</main>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>
    const CAMINHO_API = '../../../api';
    const CAMINHO_FRONTEND = '../..';
</script>
<script src="../../css/style.js"></script>
<script src="../../js/_cabecalho.js"></script>
<script src="./chat.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
