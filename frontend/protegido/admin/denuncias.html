<!DOCTYPE html>
<html lang="pt-BR">

    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<header class="bg-white shadow-sm border-b border-slate-200">
    <div class="mx-auto flex h-16 md:mx-12 lg:mx-28 items-center gap-8 px-4 sm:px-6">
        <a href="../../home.html" class="block text-blue-600">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-10 h-10">
                <path d="M12 28C17.5 28 20 22 27 22C31.5 22 34.5 24.5 34.5 24.5C34.5 24.5 30.5 19 24 19C17 19 14.5 25 8 25C8 25 9.5 28 12 28Z" fill="currentColor"/>
                <path d="M19 20C24.5 20 27 14 34 14C38.5 14 41.5 16.5 41.5 16.5C41.5 16.5 37.5 11 31 11C24 11 21.5 17 15 17C15 17 16.5 20 19 20Z" fill="currentColor"/>
            </svg>
        </a>
        <div class="flex flex-1 items-center justify-end md:justify-between">
            <nav aria-label="Global" class="hidden md:block">
                <ul class="flex items-center gap-6 text-sm font-medium text-slate-600">
                    <li><a href="../../home.html" class="transition hover:text-blue-600">Home</a></li>
                    <li><a href="../../catalogo.html" class="transition hover:text-blue-600">Catálogo</a></li>
                    <li><a href="../../sobre.html" class="transition hover:text-blue-600">Sobre</a></li>
                </ul>
            </nav>
            <div id="menuUsuario"></div>
        </div>
    </div>
</header>

<main class="flex flex-col gap-4 sm:mx-8 md:mx-16 lg:mx-24 px-8 py-8 my-8">
    <div class="flex flex-col gap-8 mb-12">
        <div class="flex items-end justify-between gap-4 flex-wrap">
            <div>
                <h1 class="text-3xl font-bold">Denúncias</h1>
                <p class="text-sm text-slate-500 mt-2">Acompanhe denúncias enviadas por usuários contra clientes e lojistas.</p>
            </div>
            <div class="flex rounded-xl border border-slate-200 bg-white p-1 shadow-sm">
                <button class="filtroStatus rounded-lg px-4 py-2 text-sm font-semibold text-blue-700 bg-blue-50" data-status="">Todas</button>
                <button class="filtroStatus rounded-lg px-4 py-2 text-sm font-semibold text-slate-600" data-status="pendente">Pendentes</button>
                <button class="filtroStatus rounded-lg px-4 py-2 text-sm font-semibold text-slate-600" data-status="em_analise">Em análise</button>
                <button class="filtroStatus rounded-lg px-4 py-2 text-sm font-semibold text-slate-600" data-status="resolvida">Resolvidas</button>
                <button class="filtroStatus rounded-lg px-4 py-2 text-sm font-semibold text-slate-600" data-status="recusada">Recusadas</button>
            </div>
        </div>

        <div id="mensagemFeedback" class="hidden rounded-xl border px-4 py-3 text-sm"></div>

        <section id="listaDenuncias" class="grid gap-4">
            <div class="rounded-2xl border border-slate-200 bg-white p-6 text-sm text-slate-500 shadow-sm">Carregando denúncias...</div>
        </section>
    </div>
</main>

<footer class="border-t border-slate-200 bg-white">
    <div class="mx-auto px-8 py-4 text-center text-sm text-slate-500">

    </div>
</footer>
