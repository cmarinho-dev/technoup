<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - TechnoUp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-optical-sizing: auto; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; color: #1a1a1a; line-height: 1.6; }
        h1, h2, h3, h4 { font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
    </style>
</head>
<body>

<!-- CABEÇALHO -->
<header class="bg-white shadow-sm border-b border-slate-200">
    <div class="mx-auto flex h-16 md:mx-12 lg:mx-28 items-center gap-8 px-4 sm:px-6">
        <a href="../../home.html" class="block text-blue-600">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-10 h-10">
                <path d="M12 28C17.5 28 20 22 27 22C31.5 22 34.5 24.5 34.5 24.5C34.5 24.5 30.5 19 24 19C17 19 14.5 25 8 25C8 25 9.5 28 12 28Z" fill="currentColor"/>
                <path d="M19 20C24.5 20 27 14 34 14C38.5 14 41.5 16.5 41.5 16.5C41.5 16.5 37.5 11 31 11C24 11 21.5 17 15 17C15 17 16.5 20 19 20Z" fill="currentColor"/>
            </svg>
        </a>
        <div class="flex flex-1 items-center justify-end md:justify-between">
            <nav aria-label="Global" class="hidden md:block">
                <ul class="flex items-center gap-6 text-sm font-medium text-slate-600">
                    <li><a class="transition hover:text-blue-600" href="../../home.html">Home</a></li>
                    <li><a class="transition hover:text-blue-600" href="../../catalogo.html">Catálogo</a></li>
                    <li><a class="transition hover:text-blue-600" href="../../sobre.html">Sobre</a></li>
                </ul>
            </nav>
            <div id="menuUsuario"></div>
        </div>
    </div>
</header>

<!-- CONTEÚDO PRINCIPAL -->
<main class="flex flex-col gap-4 sm:mx-8 md:mx-16 lg:mx-24 px-8 py-8 my-8">
    <section class="mx-auto max-w-3xl w-full">
        <div class="mb-8">
            <p class="text-sm font-semibold uppercase tracking-[0.22em] text-blue-600">Perfil</p>
            <h1 class="mt-2 text-3xl font-bold text-slate-900">Atualize os dados da sua conta</h1>
            <p id="subtitulo" class="mt-3 text-sm leading-7 text-slate-600">Edite nome, email e senha de acesso.</p>
        </div>

        <div class="rounded-[2rem] border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
            <!-- Mensagem de feedback (oculta por padrão) -->
            <div id="mensagemSucesso" class="hidden mb-4 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700"></div>
            <div id="mensagemErro"   class="hidden mb-4 rounded-2xl border border-red-200   bg-red-50   px-4 py-3 text-sm text-red-700"></div>

            <!-- Formulário sem action — JS cuida do envio -->
            <div id="perfilBox" class="space-y-5">
                <div>
                    <label for="inputNome" class="mb-1.5 block text-sm font-medium text-slate-700">Nome</label>
                    <input type="text" id="inputNome" required
                        class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm transition-colors focus:border-blue-600 focus:outline-none focus:ring-1 focus:ring-blue-600">
                </div>
                <div>
                    <label for="inputEmail" class="mb-1.5 block text-sm font-medium text-slate-700">Email</label>
                    <input type="email" id="inputEmail" required
                        class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm transition-colors focus:border-blue-600 focus:outline-none focus:ring-1 focus:ring-blue-600">
                </div>
                <div>
                    <label for="inputSenha" class="mb-1.5 block text-sm font-medium text-slate-700">Nova senha</label>
                    <input type="password" id="inputSenha" placeholder="Preencha somente se desejar alterar"
                        class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm transition-colors focus:border-blue-600 focus:outline-none focus:ring-1 focus:ring-blue-600">
                </div>
                <div class="flex flex-wrap items-center justify-between gap-3 pt-2">
                    <button id="btnSalvar"
                        class="rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2">
                        Salvar alterações
                    </button>
                </div>
            </div>
        </div>
    </section>
</main>

<!-- RODAPÉ -->
<footer class="border-t border-slate-200 bg-white">
    <div class="mx-auto grid gap-10 px-8 py-10 sm:mx-8 md:mx-16 lg:mx-24 lg:grid-cols-[1.3fr_0.7fr_0.7fr_0.9fr]">
        <div>
            <p class="text-lg font-semibold text-slate-900">TechnoUp</p>
            <p class="text-sm text-slate-500">Marketplace de tecnologia e lojas parceiras.</p>
        </div>
        <div>
            <h2 class="text-sm font-semibold uppercase tracking-[0.22em] text-slate-400">Navegacao</h2>
            <div class="mt-4 flex flex-col gap-3 text-sm text-slate-600">
                <a class="transition hover:text-blue-600" href="../../home.html">Home</a>
                <a class="transition hover:text-blue-600" href="../../catalogo.html">Catalogo</a>
                <a class="transition hover:text-blue-600" href="../../sobre.html">Sobre</a>
            </div>
        </div>
    </div>
    <div class="border-t border-slate-200 px-8 py-4 text-center text-sm text-slate-500">
        TechnoUp &copy; 2026. Todos os direitos reservados.
    </div>
</footer>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>
    const CAMINHO_API     = '../../../api';
    const CAMINHO_FRONTEND = '../..';
</script>
<script src="../../js/_cabecalho.js"></script>
<script src="js/perfil.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
