    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<!-- CABEÇALHO -->
<header>
    <div>
        <a href="../../home.html">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 28C17.5 28 20 22 27 22C31.5 22 34.5 24.5 34.5 24.5C34.5 24.5 30.5 19 24 19C17 19 14.5 25 8 25C8 25 9.5 28 12 28Z" fill="currentColor"/>

            </svg>

        <div>
            <nav aria-label="Global">
                <ul>
                    <li><a href="../../home.html">Home</a></li>
                    <li><a href="../../catalogo.html">Catálogo</a></li>
                    <li><a href="../../sobre.html">Sobre</a></li>
                </ul>
            </nav>
            <div id="menuUsuario"></div>
        </div>
    </div>
</header>

<!-- CONTEÚDO PRINCIPAL -->
<main>
    <section>
        <div>
            <p>Perfil</p>
            <h1>Atualize os dados da sua conta</h1>
            <p id="subtitulo">Edite nome, email e senha de acesso.</p>
        </div>

        <div>
            <!-- Mensagem de feedback (oculta por padrão) -->
            <div id="mensagemSucesso"></div>
            <div id="mensagemErro"  ></div>

            <!-- Formulário sem action — JS cuida do envio -->
            <div id="perfilBox">
                <div>
                    <label for="inputNome">Nome</label>
                    <input type="text" id="inputNome" required
                       >
                </div>
                <div>
                    <label for="inputEmail">Email</label>
                    <input type="email" id="inputEmail" required
                       >
                </div>
                <div>
                    <label for="inputSenha">Nova senha</label>
                    <input type="password" id="inputSenha" placeholder="Preencha somente se desejar alterar"
                       >
                </div>
                <div>
                    <button id="btnSalvar"
                       >
                        Salvar alterações
                    </button>
                </div>
            </div>
        </div>
    </section>
</main>

<!-- RODAPÉ -->
<footer>
    <div>
        <div>
            <p>TechnoUp</p>
            <p>Marketplace de tecnologia e lojas parceiras.</p>
        </div>
        <div>

                <a href="../../home.html">Home</a>

</body>
</html>
