<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechnoUp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div>
    <!-- Coluna do formulário -->
    <div>
        <div>
            <div>
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 28C17.5 28 20 22 27 22C31.5 22 34.5 24.5 34.5 24.5C34.5 24.5 30.5 19 24 19C17 19 14.5 25 8 25C8 25 9.5 28 12 28Z" fill="currentColor"/>
                    <path d="M19 20C24.5 20 27 14 34 14C38.5 14 41.5 16.5 41.5 16.5C41.5 16.5 37.5 11 31 11C24 11 21.5 17 15 17C15 17 16.5 20 19 20Z" fill="currentColor"/>
                </svg>
            </div>

            <h1>Entre com sua conta</h1>
            <p>
                Não possui uma conta?
                <a href="./registro.html">Crie uma conta</a>
            </p>

            <!-- Mensagem de erro (oculta por padrão) -->
            <div id="mensagemErro"></div>

            <!-- Caixa de login — sem form action, JS cuida do envio -->
            <div id="loginBox">
                <div>
                    <label for="inputEmail">Email</label>
                    <input type="email" id="inputEmail" name="email" required autocomplete="email"
                       >
                </div>
                <div>
                    <label for="inputSenha">Senha</label>
                    <input type="password" id="inputSenha" name="senha" required autocomplete="current-password"
                       >
                </div>

                <div>
                    <a id="btnVoltar" href="./home.html"
                       >
                        Voltar
                    </a>
                    <button id="btnEntrar"
                       >
                        Entrar
                    </button>
                </div>
                <div id="teste"></div>
            </div>
        </div>
    </div>

    <!-- Imagem lateral -->
    <div>
        <img
             src="https://plus.unsplash.com/premium_photo-1764695604111-68bc34f59ff1?q=80&w=1332&auto=format&fit=crop"
             alt="Ambiente de escritório moderno">
        <div></div>
    </div>
</div>

<script>
    const CAMINHO_API     = '../api';
    const CAMINHO_FRONTEND = '.';


    // apenas para testes, !remover depois
    // ira abrir uma listas de contas com login e senha
    showLogins().then(html => {
        document.getElementById('teste').innerHTML = html;
    });
    async function showLogins() {
        try {
            const response = await fetch(`${CAMINHO_API}/contas/get.php`);
            const json = await response.json();
            return `
                    ${json.data.map(conta => `
                            ${conta.tipo} <br>
                            ${conta.email} |
                            ${conta.senha}<br>
                    `).join('')}
            `;
        } catch (error) {
            return '';
        }
    }
</script>
<script src="./css/style.js"></script>
<script src="./js/login.js"></script>
</body>
</html>
