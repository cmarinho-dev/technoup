<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TechnoUp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-optical-sizing: auto; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; color: #1a1a1a; line-height: 1.6; }
        h1, h2, h3, h4 { font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
    </style>
</head>
<body>

<div class="flex flex-row-reverse min-h-screen w-full bg-white">
    <!-- Coluna do formulário -->
    <div class="flex-1 flex flex-col justify-center px-8 lg:flex-none lg:w-1/2 lg:px-16 xl:px-24">
        <div class="w-full max-w-sm mx-auto">
            <div class="mb-10 text-blue-600 inline-block">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-12 h-12">
                    <path d="M12 28C17.5 28 20 22 27 22C31.5 22 34.5 24.5 34.5 24.5C34.5 24.5 30.5 19 24 19C17 19 14.5 25 8 25C8 25 9.5 28 12 28Z" fill="currentColor"/>
                    <path d="M19 20C24.5 20 27 14 34 14C38.5 14 41.5 16.5 41.5 16.5C41.5 16.5 37.5 11 31 11C24 11 21.5 17 15 17C15 17 16.5 20 19 20Z" fill="currentColor"/>
                </svg>
            </div>

            <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-2">Crie seu cadastro</h1>
            <p class="text-sm text-slate-500 mb-8">
                Já possui uma conta?
                <a href="./login.html" class="font-semibold text-blue-600 hover:text-blue-700 hover:underline transition-colors">Entre aqui</a>
            </p>

            <!-- Mensagem de erro/sucesso -->
            <div id="mensagemErro" class="hidden mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></div>

            <!-- Caixa de registro — sem form action, JS cuida do envio -->
            <div id="registroBox" class="space-y-5">
                <!-- Tipo de conta -->
                <div>
                    <p class="text-sm font-medium text-slate-700 mb-2">Tipo de conta</p>
                    <div class="flex items-center gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" id="tipoConsumidor" name="tipo_conta" value="consumidor"
                                class="box-border size-3 appearance-none rounded-full ring-1 ring-offset-2 ring-slate-300 checked:ring-blue-600 checked:bg-blue-600"
                                checked>
                            <span class="text-sm text-slate-600">Consumidor</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" id="tipoLojista" name="tipo_conta" value="lojista"
                                class="box-border size-3 appearance-none rounded-full ring-1 ring-offset-2 ring-slate-300 checked:ring-blue-600 checked:bg-blue-600">
                            <span class="text-sm text-slate-600">Lojista</span>
                        </label>
                    </div>
                </div>

                <input type="text" id="inputNome" placeholder="Nome completo" required autocomplete="name"
                    class="w-full px-4 py-3 rounded-lg bg-white border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-colors shadow-sm">

                <input type="email" id="inputEmail" placeholder="Email" required autocomplete="email"
                    class="w-full px-4 py-3 rounded-lg bg-white border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-colors shadow-sm">

                <input type="password" id="inputSenha" placeholder="Senha" required
                    class="w-full px-4 py-3 rounded-lg bg-white border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-colors shadow-sm">

                <div>
                    <input type="password" id="inputConfirmarSenha" placeholder="Confirmar senha" required
                        class="w-full px-4 py-3 rounded-lg bg-white border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-colors shadow-sm">
                    <p id="erroSenha" class="hidden mt-1 text-xs text-red-600">As senhas não coincidem.</p>
                </div>

                <div class="flex wrap text-center gap-2">
                    <a id="btnVoltar" href="./home.html"
                        class="px-8 py-3 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg shadow-sm transition-all ease-in-out duration-200 active:scale-[0.98] outline-none focus:ring-2 focus:ring-gray-600 focus:ring-offset-2">
                        Voltar
                    </a>
                    <button id="btnCriarConta"
                        class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-sm transition-all ease-in-out duration-200 active:scale-[0.98] outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 cursor-pointer">
                        Criar conta
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Imagem lateral -->
    <div class="hidden lg:block lg:flex-1 relative">
        <img class="absolute inset-0 w-full h-full object-cover"
             src="https://images.unsplash.com/photo-1563986768817-257bf91c5753?q=80&w=1510&auto=format&fit=crop"
             alt="Ambiente de escritório moderno">
        <div class="absolute inset-0 bg-slate-900/5"></div>
    </div>
</div>

<script>
    const API     = '../api';
    const PAGINAS = '.';
</script>
<script src="./js/registro.js"></script>
</body>
</html>
