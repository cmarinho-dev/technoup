<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechnoUp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-optical-sizing: auto; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; color: #1a1a1a; line-height: 1.6; }
        h1, h2, h3, h4 { font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
    </style>
</head>
<body>

<div class="flex min-h-screen w-full bg-white">
    <!-- Coluna do formulário -->
    <div class="flex-1 flex flex-col justify-center px-8 lg:flex-none lg:w-1/2 lg:px-16 xl:px-24">
        <div class="w-full max-w-sm mx-auto">
            <div class="mb-10 text-blue-600 inline-block">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-12 h-12">
                    <path d="M12 28C17.5 28 20 22 27 22C31.5 22 34.5 24.5 34.5 24.5C34.5 24.5 30.5 19 24 19C17 19 14.5 25 8 25C8 25 9.5 28 12 28Z" fill="currentColor"/>
                    <path d="M19 20C24.5 20 27 14 34 14C38.5 14 41.5 16.5 41.5 16.5C41.5 16.5 37.5 11 31 11C24 11 21.5 17 15 17C15 17 16.5 20 19 20Z" fill="currentColor"/>
                </svg>
            </div>

            <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-2">Entre com sua conta</h1>
            <p class="text-sm text-slate-500 mb-8">
                Não possui uma conta?
                <a href="./registro.html" class="font-semibold text-blue-600 hover:text-blue-700 hover:underline transition-colors">Crie uma conta</a>
            </p>

            <!-- Mensagem de erro (oculta por padrão) -->
            <div id="mensagemErro" class="hidden mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></div>

            <!-- Caixa de login — sem form action, JS cuida do envio -->
            <div id="loginBox" class="space-y-5">
                <div>
                    <label for="inputEmail" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                    <input type="email" id="inputEmail" name="email" required autocomplete="email"
                        class="w-full px-4 py-3 rounded-lg bg-white border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-colors shadow-sm">
                </div>
                <div>
                    <label for="inputSenha" class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
                    <input type="password" id="inputSenha" name="senha" required autocomplete="current-password"
                        class="w-full px-4 py-3 rounded-lg bg-white border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-colors shadow-sm">
                </div>

                <button id="btnEntrar"
                    class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-sm transition-all ease-in-out duration-200 active:scale-[0.98] outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2">
                    Entrar
                </button>
            </div>
        </div>
    </div>

    <!-- Imagem lateral -->
    <div class="hidden lg:block lg:flex-1 relative">
        <img class="absolute inset-0 w-full h-full object-cover"
             src="https://plus.unsplash.com/premium_photo-1764695604111-68bc34f59ff1?q=80&w=1332&auto=format&fit=crop"
             alt="Ambiente de escritório moderno">
        <div class="absolute inset-0 bg-slate-900/5"></div>
    </div>
</div>

<script>
    const API     = '../api';
    const PAGINAS = '.';
</script>
<script src="./js/login.js"></script>
</body>
</html>
